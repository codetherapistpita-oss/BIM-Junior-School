name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Push static files to gh-pages branch (avoids deploy-pages API issues)
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p public
          cp index.html about.html .nojekyll public/
          cp -r css js images public/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
